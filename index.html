<script type="text/babel">
const { useState } = React;

/* ============================================================
   SYNTAX HIGHLIGHTER
============================================================ */
function daxH(raw) {
  const esc = raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const KWS = 'CALCULATE|FILTER|ALL|ALLEXCEPT|ALLSELECTED|DIVIDE|SUM|SUMX|COUNT|COUNTA|COUNTBLANK|COUNTX|DISTINCTCOUNT|AVERAGE|AVERAGEX|MAX|MAXX|MIN|MINX|IF|SWITCH|IFERROR|ISBLANK|BLANK|TRUE|FALSE|RELATED|RELATEDTABLE|LOOKUPVALUE|USERELATIONSHIP|CROSSFILTER|KEEPFILTERS|REMOVEFILTERS|TOTALYTD|TOTALQTD|TOTALMTD|SAMEPERIODLASTYEAR|DATEADD|PARALLELPERIOD|DATESBETWEEN|DATESYTD|RANKX|TOPN|HASONEVALUE|SELECTEDVALUE|VALUES|DISTINCT|EARLIER|CONTAINS|FORMAT|YEAR|MONTH|DAY|DATE';
  return esc.split('\n').map(line => {
    if (line.trim().startsWith('//')) return `<span class="dax-cmt">${line}</span>`;
    let l = line;
    l = l.replace(/(\/\/.*$)/, '<span class="dax-cmt">$1</span>');
    l = l.replace(/"([^"]*)"/g, '<span class="dax-str">&quot;$1&quot;</span>');
    l = l.replace(/\b(VAR|RETURN)\b/g, '<span class="dax-var">$1</span>');
    l = l.replace(new RegExp(`\\b(${KWS})\\b`, 'g'), '<span class="dax-kw">$1</span>');
    l = l.replace(/([A-Za-z_][A-Za-z0-9_ ]*)\[([^\]]+)\]/g,
      '<span class="dax-tbl">$1</span>[<span class="dax-col">$2</span>]');
    l = l.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="dax-num">$1</span>');
    return l;
  }).join('\n');
}

function Code({ code, label }) {
  return (
    <div>
      {label && <div style={{color:'#8b86a8',fontSize:'.68rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.3rem',fontFamily:'DM Mono, monospace'}}>{label}</div>}
      <div className="code-block" dangerouslySetInnerHTML={{ __html: daxH(code) }} />
    </div>
  );
}

============================================================ */
function Badge({ text, color = 'teal' }) {
  const C = {
    teal:   { bg:'rgba(19,214,193,.12)',  bd:'rgba(19,214,193,.3)',  tx:'#13d6c1' },
    navy:   { bg:'rgba(29,8,94,.45)',     bd:'rgba(157,143,245,.25)',tx:'#9d8ff5' },
    green:  { bg:'rgba(16,185,129,.12)', bd:'rgba(16,185,129,.3)',  tx:'#10b981' },
    orange: { bg:'rgba(251,146,60,.12)', bd:'rgba(251,146,60,.3)',  tx:'#fb923c' },
    red:    { bg:'rgba(239,68,68,.1)',   bd:'rgba(239,68,68,.3)',   tx:'#ef4444' },
  }[color] || {};
  return (
    <span style={{background:C.bg,border:`1px solid ${C.bd}`,color:C.tx,borderRadius:'4px',padding:'.12rem .45rem',fontSize:'.68rem',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',fontFamily:'DM Mono, monospace',whiteSpace:'nowrap'}}>{text}</span>
  );
}

function H2({ title, sub }) {
  return (
    <div style={{marginBottom:'1.25rem'}}>

  );
}

function DataTable({ headers, rows, result }) {
  return (
    <div>
      <div style={{overflowX:'auto',borderRadius:'8px',border:'1px solid #221b56'}}>
        <table className="dt">

            {result}
          </span>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   ROAS CALCULATOR
============================================================ */
function ROASCalc() {
  const [spend,      setSpend]      = useState(5000);
  const [revenue,    setRevenue]    = useState(22000);
  const [conv,       setConv]       = useState(180);

  const roas     = spend > 0 ? (revenue / spend).toFixed(2) : '0.00';
  const roasN    = parseFloat(roas);
  const profit   = revenue - spend;
  const roi      = spend > 0 ? (((revenue - spend) / spend) * 100).toFixed(1) : '0.0';
  const cpa      = conv  > 0 ? (spend   / conv).toFixed(2) : '0.00';
  const convVal  = conv  > 0 ? (revenue / conv).toFixed(2) : '0.00';

  const rc = roasN >= 4 ? '#10b981' : roasN >= 2 ? '#13d6c1' : roasN >= 1 ? '#fb923c' : '#ef4444';
  const rl = roasN >= 4 ? 'Excelente' : roasN >= 2 ? 'Bueno' : roasN >= 1 ? 'Mejorable' : 'Negativo';

  const Slider = ({ label, value, set, min, max, step, prefix }) => (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.35rem'}}>
        <label style={{fontSize:'.78rem',color:'#8b86a8',fontWeight:500}}>{label}</label>
        <span style={{fontFamily:'DM Mono,monospace',fontSize:'.88rem',color:'#e8e6f0',fontWeight:700,background:'#1a1542',border:'1px solid #221b56',borderRadius:'6px',padding:'.12rem .45rem',minWidth:'88px',textAlign:'right',display:'inline-block'}}>
          {prefix}{value.toLocaleString()}
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => set(Number(e.target.value))} />
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'.67rem',color:'#3e3a5e',marginTop:'.12rem',fontFamily:'DM Mono,monospace'}}>
        <span>{prefix}{min.toLocaleString()}</span><span>{prefix}{max.toLocaleString()}</span>
      </div>
    </div>
  );

  const KPI = ({ label, value, sub, color }) => (
    <div style={{background:'#1a1542',border:`1px solid ${color}35`,borderRadius:'10px',padding:'.8rem',textAlign:'center'}}>
      <div style={{fontSize:'1.4rem',fontWeight:800,color,lineHeight:1.1,fontFamily:'Sora,sans-serif'}}>{value}</div>
      <div style={{fontSize:'.72rem',color:'#e8e6f0',fontWeight:600,marginTop:'.18rem'}}>{label}</div>
      {sub && <div style={{fontSize:'.68rem',color:'#8b86a8',marginTop:'.1rem'}}>{sub}</div>}
    </div>
  );

  const daxCode = `// ROAS — Retorno sobre inversión publicitaria
ROAS = 
DIVIDE(
    SUM(Sales[Revenue]),
    SUM(Marketing[AdSpend]),
    0
)

// Profit
Profit = 
SUM(Sales[Revenue]) - SUM(Marketing[AdSpend])

// ROI %
ROI % = 
DIVIDE(
    SUM(Sales[Revenue]) - SUM(Marketing[AdSpend]),
    SUM(Marketing[AdSpend])
)

// CPA — Costo por Adquisición
CPA = 
DIVIDE(
    SUM(Marketing[AdSpend]),
    COUNT(Sales[ConversionID]),
    BLANK()
)`;

  const interp = roasN >= 4
    ? ' Estás por encima del umbral óptimo de rentabilidad (4x). Considera escalar el presupuesto en los canales con mejor desempeño.'
    : roasN >= 2
    ? ' Estás generando retorno positivo. Analiza los canales con mayor CPA para optimizar la distribución del presupuesto.'
    : roasN >= 1
    ? ' Recuperas la inversión, pero el margen es estrecho. Revisa la segmentación y la estrategia de puja.'
    : ' La campaña está perdiendo dinero. Pausar y revisar la estrategia de audiencia es urgente.';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr',gap:'1.25rem'}}>
        <div className="card">
          <div style={{fontSize:'.7rem',color:'#13d6c1',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'1rem'}}>Parámetros de entrada</div>
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <Slider label="Inversión publicitaria (Ad Spend)" value={spend} set={setSpend} min={100} max={50000} step={100} prefix="$" />
            <Slider label="Ingresos generados (Revenue)" value={revenue} set={setRevenue} min={0} max={200000} step={500} prefix="$" />
            <Slider label="Conversiones" value={conv} set={setConv} min={1} max={2000} step={1} prefix="" />
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:'.65rem'}}>
          <div style={{background:`${rc}12`,border:`2px solid ${rc}`,borderRadius:'12px',padding:'.9rem',textAlign:'center'}}>
            <div style={{fontSize:'2.8rem',fontWeight:800,color:rc,lineHeight:1,fontFamily:'Sora,sans-serif'}}>{roas}x</div>
            <div style={{color:'#e8e6f0',fontWeight:700,fontSize:'.95rem',marginTop:'.25rem'}}>ROAS</div>
            <span style={{display:'inline-block',background:`${rc}20`,border:`1px solid ${rc}40`,borderRadius:'4px',padding:'.12rem .45rem',fontSize:'.68rem',color:rc,fontWeight:700,marginTop:'.25rem',fontFamily:'DM Mono,monospace',textTransform:'uppercase'}}>{rl}</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.55rem'}}>
            <KPI label="Profit" value={`$${profit.toLocaleString()}`} color={profit >= 0 ? '#10b981' : '#ef4444'} />
            <KPI label="ROI" value={`${roi}%`} color={parseFloat(roi) >= 0 ? '#13d6c1' : '#ef4444'} />
            <KPI label="CPA" value={`$${cpa}`} sub="Costo por conv." color="#9d8ff5" />
            <KPI label="Conv. Value" value={`$${convVal}`} sub="Valor promedio" color="#fb923c" />
          </div>
        </div>
      </div>

      <Code code={daxCode} label="Fórmulas DAX equivalentes" />

      <div className="analogy-box">
        <div style={{fontSize:'.68rem',color:'#13d6c1',fontWeight:700,marginBottom:'.25rem',textTransform:'uppercase',letterSpacing:'.08em'}}>Interpretación</div>
        Un ROAS de {roas}x significa que por cada $1 invertido en publicidad se generan ${roas} en ingresos.{interp}
      </div>
    </div>
  );
}

/* ============================================================
   QUIZ
============================================================ */
function Quiz() {
  const [cur,        setCur]        = useState(0);
  const [answers,    setAnswers]    = useState({});
  const [showResult, setShowResult] = useState(false);

  const q        = QUIZ[cur];
  const answered = answers[cur] !== undefined;
  const score    = Object.keys(answers).filter(k => answers[k] === QUIZ[k].correct).length;

  function pick(i) {
    if (answered) return;
    setAnswers(prev => ({ ...prev, [cur]: i }));
  }

  function reset() { setAnswers({}); setCur(0); setShowResult(false); }

  if (showResult) {
    const pct = Math.round((score / QUIZ.length) * 100);
    const c   = pct >= 80 ? '#10b981' : pct >= 60 ? '#13d6c1' : '#fb923c';
    return (
      <div className="card fade-up" style={{textAlign:'center',padding:'2rem 1.25rem'}}>
        <div style={{fontSize:'3.2rem',fontWeight:800,color:c,lineHeight:1,fontFamily:'Sora,sans-serif'}}>{score}/{QUIZ.length}</div>
        <div style={{fontSize:'1.05rem',fontWeight:600,color:'#e8e6f0',marginTop:'.45rem'}}>
          {pct >= 80 ? 'Excelente dominio de DAX' : pct >= 60 ? 'Buen progreso' : 'Sigue practicando'}
        </div>
        <p style={{color:'#8b86a8',fontSize:'.83rem',marginTop:'.35rem',marginBottom:'1.4rem',lineHeight:1.5}}>
          {pct >= 80 ? 'Tienes una base sólida para construir modelos complejos en producción.'
                     : pct >= 60 ? 'Revisa las secciones de CALCULATE y contextos de evaluación.'
                                 : 'Empieza por los Fundamentos y el módulo DAX Esencial.'}
        </p>
        <button onClick={reset} className="nav-btn-primary">Intentar de nuevo</button>
      </div>
    );
  }

  return (
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.85rem'}}>
        <span style={{fontSize:'.72rem',color:'#8b86a8',fontFamily:'DM Mono,monospace'}}>Pregunta {cur+1} de {QUIZ.length}</span>
        <div style={{display:'flex',gap:'4px'}}>
          {QUIZ.map((_,i) => (
            <div key={i} style={{width:'20px',height:'4px',borderRadius:'2px',
              background: i < cur ? '#13d6c1' : i === cur ? '#9d8ff5' : '#221b56'}}/>
          ))}
        </div>
      </div>

      <div style={{fontWeight:600,fontSize:'.92rem',color:'#e8e6f0',marginBottom:'.85rem',lineHeight:1.5}}>{q.q}</div>

      <div style={{display:'flex',flexDirection:'column',gap:'.45rem',marginBottom:'.85rem'}}>
        {q.opts.map((opt, i) => {
          let cls = 'qopt';
          if (answered) {
            if (i === q.correct) cls += ' correct';
            else if (i === answers[cur] && i !== q.correct) cls += ' wrong';
          } else if (answers[cur] === i) cls += ' selected';
          return (
            <button key={i} className={cls} onClick={() => pick(i)} disabled={answered}>
              <span style={{color:'#8b86a8',fontFamily:'DM Mono,monospace',marginRight:'.45rem',fontSize:'.78rem'}}>{String.fromCharCode(65+i)}.</span>
              {opt}
            </button>
          );
        })}
      </div>

      {answered && (
        <div className="analogy-box fade-up" style={{marginBottom:'.85rem'}}>
          <div style={{fontSize:'.68rem',color: answers[cur] === q.correct ? '#10b981' : '#ef4444',fontWeight:700,marginBottom:'.22rem',textTransform:'uppercase',letterSpacing:'.08em'}}>
            {answers[cur] === q.correct ? 'Correcto' : 'Incorrecto'}
          </div>
          {q.exp}
        </div>
      )}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button className="nav-btn" onClick={() => setCur(c => Math.max(0,c-1))} disabled={cur===0}>Anterior</button>
        {cur < QUIZ.length-1
          ? <button className="nav-btn-primary" onClick={() => setCur(c => c+1)} disabled={!answered}>Siguiente</button>
          : <button
              onClick={() => setShowResult(true)}
              disabled={!answered}
              style={{background: answered ? '#1d085e' : '#221b56',border:`1px solid ${answered?'#13d6c1':'#221b56'}`,color: answered ? '#13d6c1' : '#3e3a5e',borderRadius:'6px',padding:'.48rem .9rem',fontWeight:700,cursor: answered?'pointer':'not-allowed',fontSize:'.8rem',fontFamily:'Sora,sans-serif'}}>
              Ver resultado
            </button>
        }
      </div>
    </div>
  );
}

          <div className="analogy-box" style={{marginBottom:'.9rem'}}>
            <div style={{fontSize:'.68rem',color:'#13d6c1',fontWeight:700,marginBottom:'.22rem',textTransform:'uppercase',letterSpacing:'.08em'}}>Analogía del supermercado</div>
            <strong style={{color:'#e8e6f0'}}>Contexto de fila:</strong> Caminas por el supermercado leyendo el precio de cada producto, uno por uno. Ves el precio de "ese" producto específico. DAX opera sobre una fila a la vez.<br/><br/>
            <strong style={{color:'#e8e6f0'}}>Contexto de filtro:</strong> El gerente decide mostrar solo productos de "Lácteos" en el monitor. Ahora solo ves esa sección. Eso es lo que selecciona el usuario con un slicer o gráfico — DAX solo calcula sobre ese subconjunto.
          </div>

              <div style={{fontSize:'.76rem',color:'#8b86a8',lineHeight:1.5}}>Existe en columnas calculadas e iteradores (SUMX, AVERAGEX, MAXX). DAX procesa cada fila de forma independiente.</div>

              <div style={{fontSize:'.76rem',color:'#8b86a8',lineHeight:1.5}}>Creado por el visual, slicers y CALCULATE. Define qué subconjunto de datos está activo para evaluar una medida.</div>
            </div>
          </div>
          <Code code={`// Contexto de FILA (columna calculada)
// Cada fila accede solo a sus propios valores
Profit Per Row = 
Sales[Revenue] - Sales[Cost]
// → Fila 1: 100 - 60 = 40
// → Fila 2: 250 - 180 = 70

// Contexto de FILTRO (medida)
// "Ventas de Electrónica en Q1 2025"
// se construye desde los slicers y CALCULATE
Total Filtered Sales = 
CALCULATE(
    SUM(Sales[Amount]),
    Products[Category] = "Electronics",  // filtro explícito
    Dates[Quarter] = "Q1"               // filtro adicional
)`} label="Contextos en código" />
        </div>
      </div>

      <div>
        <H2 title="Transición de Contexto" sub="El puente entre contexto de fila y de filtro" />
        <div className="card">
          <div className="analogy-box" style={{marginBottom:'.75rem'}}>
            <div style={{fontSize:'.68rem',color:'#13d6c1',fontWeight:700,marginBottom:'.22rem',textTransform:'uppercase',letterSpacing:'.08em'}}>Concepto avanzado</div>
            Cuando usas CALCULATE dentro de una columna calculada, DAX hace una "transición de contexto": convierte el contexto de fila actual en un contexto de filtro. Es como decirle: "filtra la tabla para que solo muestre filas idénticas a esta fila actual".
          </div>
          <Code code={`// CALCULATE activa la transición contexto fila → filtro
// En una columna calculada en Products, DAX filtra
// automáticamente Sales por el ProductID de esa fila
Sales Same Product = 
CALCULATE(SUM(Sales[Amount]))
// Sin CALCULATE, usarías SUMX o RELATEDTABLE`} label="Transición de contexto" />
        </div>
      </div>
    </div>
  );
}
