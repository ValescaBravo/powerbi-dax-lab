<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function daxH(raw) {
  const esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const KWS = 'CALCULATE|FILTER|ALL|ALLEXCEPT|ALLSELECTED|DIVIDE|SUM|SUMX|COUNT|COUNTA|COUNTBLANK|COUNTX|DISTINCTCOUNT|AVERAGE|AVERAGEX|MAX|MAXX|MIN|MINX|IF|SWITCH|IFERROR|ISBLANK|BLANK|TRUE|FALSE|RELATED|RELATEDTABLE|LOOKUPVALUE|USERELATIONSHIP|CROSSFILTER|KEEPFILTERS|REMOVEFILTERS|TOTALYTD|TOTALQTD|TOTALMTD|SAMEPERIODLASTYEAR|DATEADD|PARALLELPERIOD|DATESBETWEEN|DATESYTD|RANKX|TOPN|HASONEVALUE|SELECTEDVALUE|VALUES|DISTINCT|EARLIER|CONTAINS|FORMAT|YEAR|MONTH|DAY|DATE';
  return esc.split('\n').map(line => {
    if (line.trim().startsWith('//')) return `<span class="dax-cmt">${line}</span>`;
    let l = line;
    l = l.replace(/(\/\/.*$)/, '<span class="dax-cmt">$1</span>');
    l = l.replace(/"([^"]*)"/g, '<span class="dax-str">&quot;$1&quot;</span>');
    l = l.replace(/\b(VAR|RETURN)\b/g, '<span class="dax-var">$1</span>');
    l = l.replace(new RegExp(`\\b(${KWS})\\b`, 'g'), '<span class="dax-kw">$1</span>');
    l = l.replace(/([A-Za-z_][A-Za-z0-9_ ]*)\[([^\]]+)\]/g, '<span class="dax-tbl">$1</span>[<span class="dax-col">$2</span>]');
    l = l.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="dax-num">$1</span>');
    return l;
  }).join('\n');
}

function Code({ code, label }) {
  return (
    <div>
      {label && <div style={{color:'#8b86a8',fontSize:'.68rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.3rem',fontFamily:'DM Mono, monospace'}}>{label}</div>}
      <div className="code-block" dangerouslySetInnerHTML={{ __html: daxH(code) }} />
    </div>
  );
}

function Badge({ text, color = 'teal' }) {
  const C = {
    teal:   { bg:'rgba(19,214,193,.12)',  bd:'rgba(19,214,193,.3)',  tx:'#13d6c1' },
    navy:   { bg:'rgba(29,8,94,.45)',     bd:'rgba(157,143,245,.25)',tx:'#9d8ff5' },
    green:  { bg:'rgba(16,185,129,.12)', bd:'rgba(16,185,129,.3)',  tx:'#10b981' },
    orange: { bg:'rgba(251,146,60,.12)', bd:'rgba(251,146,60,.3)',  tx:'#fb923c' },
    red:    { bg:'rgba(239,68,68,.1)',   bd:'rgba(239,68,68,.3)',   tx:'#ef4444' },
  }[color] || {};
  return (
    <span style={{background:C.bg,border:`1px solid ${C.bd}`,color:C.tx,borderRadius:'4px',padding:'.12rem .45rem',fontSize:'.68rem',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',fontFamily:'DM Mono, monospace',whiteSpace:'nowrap'}}>{text}</span>
  );
}

function H2({ title, sub }) {
  return (
    <div style={{marginBottom:'1.25rem'}}>
      <h2 style={{fontSize:'1.25rem',fontWeight:700,color:'#e8e6f0',marginBottom:'.25rem'}}>{title}</h2>
      {sub && <p style={{color:'#8b86a8',fontSize:'.83rem'}}>{sub}</p>}
    </div>
  );
}

function DataTable({ headers, rows, result }) {
  return (
    <div>
      <div style={{overflowX:'auto',borderRadius:'8px',border:'1px solid #221b56'}}>
        <table className="dt">
          <thead><tr>{headers.map(h => <th key={h}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((r,i) => <tr key={i}>{r.map((c,j) => <td key={j}>{c}</td>)}</tr>)}</tbody>
        </table>
      </div>
      {result && (
        <div style={{marginTop:'.5rem'}}>
          <span className="result-badge">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            {result}
          </span>
        </div>
      )}
    </div>
  );
}

Electronics Sales = 
CALCULATE(
    SUM(Sales[Amount]),
    Products[Category] = "Electronics"
)`,
    table:{ headers:['Product','Category','Sales'], rows:[['Laptop Pro','Electronics','$2,400'],['Mouse RGB','Electronics','$45'],['Desk Lamp','Furniture','$89'],['T-Shirt','Apparel','$29']], result:'Electronics Sales = $2,445' }

    analogy:'Like a kitchen sieve, but you decide the hole size. Only data that meets your exact condition passes through.',

Big Orders = 
CALCULATE(

% of Total =

  },

Sales LY =

    code:`// Sales from 30 days ago
Sales -30d = 
CALCULATE(
    SUM(Sales[Amount]),
    DATEADD(Dates[Date], -30, DAY)

// Sales from the previous full month
Sales Prev Month = 
CALCULATE(
    SUM(Sales[Amount]),

function FormulaCard({ f }) {
  const [open, setOpen] = useState(false);
  const dc = f.diff === 'Essential' ? 'teal' : 'orange';
  return (
    <div className="card" style={{marginBottom:'.85rem'}}>
      <div onClick={() => setOpen(!open)} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:'.7rem',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.7rem',flex:1,minWidth:0}}>
          <div style={{background:'rgba(19,214,193,.1)',border:'1px solid rgba(19,214,193,.22)',borderRadius:'7px',padding:'.35rem .6rem',fontFamily:'DM Mono,monospace',fontSize:'.82rem',color:'#13d6c1',fontWeight:500,flexShrink:0}}>{f.name}()</div>

function ROASCalc() {
  const [spend,   setSpend]   = useState(5000);
  const [revenue, setRevenue] = useState(22000);
  const [conv,    setConv]    = useState(180);

  const roas    = spend > 0 ? (revenue / spend).toFixed(2) : '0.00';
  const roasN   = parseFloat(roas);
  const profit  = revenue - spend;
  const roi     = spend > 0 ? (((revenue - spend) / spend) * 100).toFixed(1) : '0.0';
  const cpa     = conv  > 0 ? (spend   / conv).toFixed(2) : '0.00';
  const convVal = conv  > 0 ? (revenue / conv).toFixed(2) : '0.00';

  const rc = roasN >= 4 ? '#10b981' : roasN >= 2 ? '#13d6c1' : roasN >= 1 ? '#fb923c' : '#ef4444';
  const rl = roasN >= 4 ? 'Excellent' : roasN >= 2 ? 'Good' : roasN >= 1 ? 'Needs work' : 'Negative';

  const Slider = ({ label, value, set, min, max, step, prefix }) => (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.35rem'}}>
        <label style={{fontSize:'.78rem',color:'#8b86a8',fontWeight:500}}>{label}</label>
        <span style={{fontFamily:'DM Mono,monospace',fontSize:'.88rem',color:'#e8e6f0',fontWeight:700,background:'#1a1542',border:'1px solid #221b56',borderRadius:'6px',padding:'.12rem .45rem',minWidth:'88px',textAlign:'right',display:'inline-block'}}>
          {prefix}{value.toLocaleString()}
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => set(Number(e.target.value))} />
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'.67rem',color:'#3e3a5e',marginTop:'.12rem',fontFamily:'DM Mono,monospace'}}>
        <span>{prefix}{min.toLocaleString()}</span><span>{prefix}{max.toLocaleString()}</span>
      </div>
    </div>
  );

  const KPI = ({ label, value, sub, color }) => (
    <div style={{background:'#1a1542',border:`1px solid ${color}35`,borderRadius:'10px',padding:'.8rem',textAlign:'center'}}>
      <div style={{fontSize:'1.4rem',fontWeight:800,color,lineHeight:1.1,fontFamily:'Sora,sans-serif'}}>{value}</div>
      <div style={{fontSize:'.72rem',color:'#e8e6f0',fontWeight:600,marginTop:'.18rem'}}>{label}</div>
      {sub && <div style={{fontSize:'.68rem',color:'#8b86a8',marginTop:'.1rem'}}>{sub}</div>}
    </div>
  );

  const daxCode = `// ROAS — Return on Ad Spend
ROAS = 
DIVIDE(
    SUM(Sales[Revenue]),
    SUM(Marketing[AdSpend]),
    0
)

// Profit
Profit = 
SUM(Sales[Revenue]) - SUM(Marketing[AdSpend])

// ROI %
ROI % = 
DIVIDE(
    SUM(Sales[Revenue]) - SUM(Marketing[AdSpend]),
    SUM(Marketing[AdSpend])
)

// CPA — Cost Per Acquisition
CPA = 
DIVIDE(
    SUM(Marketing[AdSpend]),
    COUNT(Sales[ConversionID]),
    BLANK()
)`;

  const interp = roasN >= 4
    ? ' You are above the optimal profitability threshold (4x). Consider scaling budget in the top-performing channels.'
    : roasN >= 2
    ? ' You are generating positive return. Analyse channels with the highest CPA to optimise budget allocation.'
    : roasN >= 1
    ? ' You are recovering the investment, but the margin is tight. Review audience segmentation and bidding strategy.'
    : ' The campaign is losing money. Pausing and revising the audience strategy is urgent.';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr',gap:'1.25rem'}}>
        <div className="card">
          <div style={{fontSize:'.7rem',color:'#13d6c1',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'1rem'}}>Input Parameters</div>
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <Slider label="Ad Spend" value={spend} set={setSpend} min={100} max={50000} step={100} prefix="$" />
            <Slider label="Revenue Generated" value={revenue} set={setRevenue} min={0} max={200000} step={500} prefix="$" />
            <Slider label="Conversions" value={conv} set={setConv} min={1} max={2000} step={1} prefix="" />
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'.65rem'}}>
          <div style={{background:`${rc}12`,border:`2px solid ${rc}`,borderRadius:'12px',padding:'.9rem',textAlign:'center'}}>
            <div style={{fontSize:'2.8rem',fontWeight:800,color:rc,lineHeight:1,fontFamily:'Sora,sans-serif'}}>{roas}x</div>
            <div style={{color:'#e8e6f0',fontWeight:700,fontSize:'.95rem',marginTop:'.25rem'}}>ROAS</div>
            <span style={{display:'inline-block',background:`${rc}20`,border:`1px solid ${rc}40`,borderRadius:'4px',padding:'.12rem .45rem',fontSize:'.68rem',color:rc,fontWeight:700,marginTop:'.25rem',fontFamily:'DM Mono,monospace',textTransform:'uppercase'}}>{rl}</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.55rem'}}>
            <KPI label="Profit" value={`$${profit.toLocaleString()}`} color={profit >= 0 ? '#10b981' : '#ef4444'} />
            <KPI label="ROI" value={`${roi}%`} color={parseFloat(roi) >= 0 ? '#13d6c1' : '#ef4444'} />
            <KPI label="CPA" value={`$${cpa}`} sub="Cost per conv." color="#9d8ff5" />
            <KPI label="Conv. Value" value={`$${convVal}`} sub="Avg. value" color="#fb923c" />
          </div>
        </div>
      </div>
      <Code code={daxCode} label="Equivalent DAX Formulas" />
      <div className="analogy-box">
        <div style={{fontSize:'.68rem',color:'#13d6c1',fontWeight:700,marginBottom:'.25rem',textTransform:'uppercase',letterSpacing:'.08em'}}>Interpretation</div>
        A ROAS of {roas}x means that for every $1 invested in advertising, ${roas} in revenue is generated.{interp}
      </div>
    </div>
  );
}

function Quiz() {
  const [cur,        setCur]        = useState(0);
  const [answers,    setAnswers]    = useState({});
  const [showResult, setShowResult] = useState(false);

  const q        = QUIZ[cur];
  const answered = answers[cur] !== undefined;
  const score    = Object.keys(answers).filter(k => answers[k] === QUIZ[k].correct).length;

  function pick(i) { if (answered) return; setAnswers(prev => ({ ...prev, [cur]: i })); }
  function reset()  { setAnswers({}); setCur(0); setShowResult(false); }

  if (showResult) {
    const pct = Math.round((score / QUIZ.length) * 100);
    const c   = pct >= 80 ? '#10b981' : pct >= 60 ? '#13d6c1' : '#fb923c';
    return (
      <div className="card fade-up" style={{textAlign:'center',padding:'2rem 1.25rem'}}>
        <div style={{fontSize:'3.2rem',fontWeight:800,color:c,lineHeight:1,fontFamily:'Sora,sans-serif'}}>{score}/{QUIZ.length}</div>
        <div style={{fontSize:'1.05rem',fontWeight:600,color:'#e8e6f0',marginTop:'.45rem'}}>
          {pct >= 80 ? 'Excellent DAX command' : pct >= 60 ? 'Good progress' : 'Keep practising'}
        </div>
        <p style={{color:'#8b86a8',fontSize:'.83rem',marginTop:'.35rem',marginBottom:'1.4rem',lineHeight:1.5}}>
          {pct >= 80 ? 'You have a solid foundation to build complex production models.'
                     : pct >= 60 ? 'Review the CALCULATE and evaluation context sections.'
                                 : 'Start with Fundamentals and the Core DAX module.'}
        </p>
        <button onClick={reset} className="nav-btn-primary">Try again</button>
      </div>
    );
  }

  return (
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.85rem'}}>
        <span style={{fontSize:'.72rem',color:'#8b86a8',fontFamily:'DM Mono,monospace'}}>Question {cur+1} of {QUIZ.length}</span>
        <div style={{display:'flex',gap:'4px'}}>
          {QUIZ.map((_,i) => (
            <div key={i} style={{width:'20px',height:'4px',borderRadius:'2px',
              background: i < cur ? '#13d6c1' : i === cur ? '#9d8ff5' : '#221b56'}}/>
          ))}
        </div>
      </div>
      <div style={{fontWeight:600,fontSize:'.92rem',color:'#e8e6f0',marginBottom:'.85rem',lineHeight:1.5}}>{q.q}</div>
      <div style={{display:'flex',flexDirection:'column',gap:'.45rem',marginBottom:'.85rem'}}>
        {q.opts.map((opt, i) => {
          let cls = 'qopt';
          if (answered) {
            if (i === q.correct) cls += ' correct';
            else if (i === answers[cur] && i !== q.correct) cls += ' wrong';
          } else if (answers[cur] === i) cls += ' selected';
          return (
            <button key={i} className={cls} onClick={() => pick(i)} disabled={answered}>
              <span style={{color:'#8b86a8',fontFamily:'DM Mono,monospace',marginRight:'.45rem',fontSize:'.78rem'}}>{String.fromCharCode(65+i)}.</span>
              {opt}
            </button>
          );
        })}
      </div>
      {answered && (
        <div className="analogy-box fade-up" style={{marginBottom:'.85rem'}}>
          <div style={{fontSize:'.68rem',color: answers[cur] === q.correct ? '#10b981' : '#ef4444',fontWeight:700,marginBottom:'.22rem',textTransform:'uppercase',letterSpacing:'.08em'}}>
            {answers[cur] === q.correct ? 'Correct' : 'Incorrect'}
          </div>
          {q.exp}
        </div>
      )}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button className="nav-btn" onClick={() => setCur(c => Math.max(0,c-1))} disabled={cur===0}>Previous</button>
        {cur < QUIZ.length-1
          ? <button className="nav-btn-primary" onClick={() => setCur(c => c+1)} disabled={!answered}>Next</button>
          : <button onClick={() => setShowResult(true)} disabled={!answered}
              style={{background: answered ? '#1d085e' : '#221b56',border:`1px solid ${answered?'#13d6c1':'#221b56'}`,color: answered ? '#13d6c1' : '#3e3a5e',borderRadius:'6px',padding:'.48rem .9rem',fontWeight:700,cursor: answered?'pointer':'not-allowed',fontSize:'.8rem',fontFamily:'Sora,sans-serif'}}>
              See result
            </button>
        }
      </div>
    </div>
  );
}

function TabCoreDAX() {
  return (
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:'2rem'}}>
      <div>
        <H2 title="Measures vs Calculated Columns" sub="The most important decision in DAX" />
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.7rem',marginBottom:'.85rem'}}>
          <div className="card" style={{borderTop:'3px solid #13d6c1'}}>
            <div style={{color:'#13d6c1',fontWeight:700,fontSize:'.88rem',marginBottom:'.4rem'}}>Measure</div>
            <div style={{fontSize:'.78rem',color:'#8b86a8',lineHeight:1.6,marginBottom:'.65rem'}}>Evaluated at query time. Dynamic — responds to the visual context. Does not occupy space in the model.</div>
            <div style={{display:'flex',flexDirection:'column',gap:'.28rem'}}>
              <Badge text="Dynamic" color="teal"/>
              <Badge text="No RAM usage" color="green"/>
              <Badge text="Requires aggregation" color="navy"/>
            </div>
          </div>
          <div className="card" style={{borderTop:'3px solid #9d8ff5'}}>
            <div style={{color:'#9d8ff5',fontWeight:700,fontSize:'.88rem',marginBottom:'.4rem'}}>Calculated Column</div>
            <div style={{fontSize:'.78rem',color:'#8b86a8',lineHeight:1.6,marginBottom:'.65rem'}}>Evaluated when the model refreshes. Static, materialised in memory. Useful for segmentation and filters.</div>
            <div style={{display:'flex',flexDirection:'column',gap:'.28rem'}}>
              <Badge text="Static" color="orange"/>
              <Badge text="Uses RAM" color="orange"/>
              <Badge text="Filterable" color="navy"/>
            </div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.65rem'}}>
          <Code code={`// MEASURE — dynamic sum
Total Sales = 
SUM(Sales[Amount])
// Changes with every visual filter`} label="Example: Measure" />
          <Code code={`// CALCULATED COLUMN — categorises price
Price Category = 
IF(
    Products[Price] > 100,
    "Premium",
    "Standard"
)
// Evaluated once at refresh`} label="Example: Calculated Column" />
        </div>
      </div>

      <div>
        <H2 title="Row Context vs Filter Context" sub="The hardest DAX concept, explained with a supermarket" />
        <div className="card" style={{marginBottom:'.85rem'}}>
          <div className="analogy-box" style={{marginBottom:'.9rem'}}>
            <div style={{fontSize:'.68rem',color:'#13d6c1',fontWeight:700,marginBottom:'.22rem',textTransform:'uppercase',letterSpacing:'.08em'}}>Supermarket analogy</div>
            <strong style={{color:'#e8e6f0'}}>Row context:</strong> You walk through the supermarket reading the price of each product, one by one. You see the price of "that specific" product. DAX operates on one row at a time.<br/><br/>
            <strong style={{color:'#e8e6f0'}}>Filter context:</strong> The manager decides to show only "Dairy" products on the screen. Now you only see that section. That is what the user selects with a slicer or chart — DAX only calculates on that subset.
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.65rem',marginBottom:'.85rem'}}>
            <div style={{background:'#1a1542',border:'1px solid #221b56',borderRadius:'8px',padding:'.7rem'}}>
              <div style={{fontWeight:700,color:'#9d8ff5',fontSize:'.8rem',marginBottom:'.4rem'}}>Row Context</div>
              <div style={{fontSize:'.76rem',color:'#8b86a8',lineHeight:1.5}}>Exists in calculated columns and iterators (SUMX, AVERAGEX, MAXX). DAX processes each row independently.</div>
            </div>
            <div style={{background:'#1a1542',border:'1px solid #221b56',borderRadius:'8px',padding:'.7rem'}}>
              <div style={{fontWeight:700,color:'#13d6c1',fontSize:'.8rem',marginBottom:'.4rem'}}>Filter Context</div>
              <div style={{fontSize:'.76rem',color:'#8b86a8',lineHeight:1.5}}>Created by visuals, slicers, and CALCULATE. Defines which subset of data is active when evaluating a measure.</div>
            </div>
          </div>
          <Code code={`// ROW context (calculated column)
// Each row accesses only its own values
Profit Per Row = 
Sales[Revenue] - Sales[Cost]
// → Row 1: 100 - 60 = 40
// → Row 2: 250 - 180 = 70

// FILTER context (measure)
// "Electronics sales in Q1 2025"
// built from slicers and CALCULATE
Total Filtered Sales = 
CALCULATE(
    SUM(Sales[Amount]),
    Products[Category] = "Electronics",  // explicit filter
    Dates[Quarter] = "Q1"               // additional filter
)`} label="Contexts in code" />
        </div>
      </div>

      <div>
        <H2 title="Context Transition" sub="The bridge between row context and filter context" />
        <div className="card">
          <div className="analogy-box" style={{marginBottom:'.75rem'}}>
            <div style={{fontSize:'.68rem',color:'#13d6c1',fontWeight:700,marginBottom:'.22rem',textTransform:'uppercase',letterSpacing:'.08em'}}>Advanced concept</div>
            When you use CALCULATE inside a calculated column, DAX performs a "context transition": it converts the current row context into a filter context. It is like telling DAX: "filter the table to show only rows identical to this current row".
          </div>
          <Code code={`// CALCULATE triggers the row → filter context transition

)` },

DIVIDE(SUM(Sales[Amount]), SUM(Sales[Amount]))`,
              right:`// CORRECT: ALL() removes filter from denominator

)` },
